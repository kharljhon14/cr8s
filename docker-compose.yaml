version: '3.3'

services:
  postgres:
    image: postgres:latest
    enviroment: 
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
  redis:
    image: redis:latest
  
  app:
    build: .
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres/app_db
